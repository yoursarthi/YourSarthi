<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Sarthi - LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f6f9;
      --surface: #ffffff;
      --surface2: #f0f4f8;
      --surface3: #e4eaf2;
      --border: rgba(15,23,42,0.09);
      --border2: rgba(15,23,42,0.15);
      --text: #0f172a;
      --text-muted: #475569;
      --text-dim: #94a3b8;
      --accent: #6366f1;
      --accent-light: rgba(99,102,241,0.10);
      --accent-hover: #4f46e5;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
    }

    * { box-sizing: border-box; }
    html { font-family: 'Inter', system-ui, Arial, sans-serif; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, Arial, sans-serif;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(15,23,42,0.18); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(15,23,42,0.3); }

    /* ── Sidebar ── */
    .sidebar-item {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.15s ease;
      border: none;
      background: transparent;
      cursor: pointer;
      border-left: 2px solid transparent;
      gap: 10px;
      text-align: left;
    }
    .sidebar-item:hover {
      background: rgba(99,102,241,0.07);
      color: var(--text);
    }
    .sidebar-item.active {
      background: var(--accent-light);
      color: #6366f1;
      border-left: 2px solid var(--accent);
      font-weight: 600;
    }
    .sidebar-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
      padding: 0 12px;
      margin: 16px 0 4px;
    }

    /* ── Glass cards ── */
    .glass-card {
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      box-shadow: 0 1px 4px rgba(15,23,42,0.06);
    }
    .dark-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(15,23,42,0.06);
    }
    .surface2-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    /* ── Stat card hover ── */
    .stat-card {
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      border-color: rgba(99,102,241,0.3);
      box-shadow: 0 8px 32px rgba(99,102,241,0.12);
    }
    .data-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 1px 3px rgba(15,23,42,0.06);
    }
    .data-card:hover {
      border-color: rgba(99,102,241,0.25);
      box-shadow: 0 4px 16px rgba(15,23,42,0.1);
    }
    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-active   { background: rgba(16,185,129,0.12); color: #047857; border: 1px solid rgba(16,185,129,0.2); }
    .badge-inactive { background: rgba(239,68,68,0.10);  color: #b91c1c; border: 1px solid rgba(239,68,68,0.2); }
    .badge-pending  { background: rgba(245,158,11,0.12); color: #b45309; border: 1px solid rgba(245,158,11,0.2); }

    /* ── Inputs ── */
    .form-input {
      width: 100%;
      padding: 9px 13px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      font-size: 13.5px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .form-input::placeholder { color: var(--text-dim); }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
      background: var(--surface);
    }
    select.form-input option { background: var(--surface); color: var(--text); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s ease;
      background: transparent;
      font-family: 'Inter', sans-serif;
    }
    .btn:hover { transform: scale(1.02); }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 1px 4px rgba(99,102,241,0.35); }
    .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 2px 10px rgba(99,102,241,0.4); }
    .btn-danger { background: rgba(239,68,68,0.10); color: #b91c1c; border: 1px solid rgba(239,68,68,0.2); }
    .btn-danger:hover { background: rgba(239,68,68,0.18); }
    .btn-ghost { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border2); }
    .btn-ghost:hover { background: var(--surface3); color: var(--text); }
    .btn-success { background: rgba(16,185,129,0.12); color: #047857; border: 1px solid rgba(16,185,129,0.2); }
    .btn-success:hover { background: rgba(16,185,129,0.2); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.35);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 28px;
      max-width: 520px;
      width: 90%;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(15,23,42,0.18);
    }
    .modal-box-lg {
      max-width: 700px;
    }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
      border: 1px solid var(--border);
    }
    .tab-btn {
      padding: 7px 14px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .tab-btn:hover { color: var(--text); background: rgba(15,23,42,0.05); }
    .tab-btn.active { background: var(--accent); color: #fff; }

    /* ── Animations ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up { animation: fadeInUp 0.25s ease both; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page-fade { animation: fadeIn 0.2s ease; }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.4); }
    }
    .pulse-dot { animation: pulseDot 1.8s ease-in-out infinite; }

    @keyframes skeleton {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 0.3; }
    }
    .skeleton {
      animation: skeleton 1.6s ease-in-out infinite;
      background: rgba(15,23,42,0.08);
      border-radius: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
    .float { animation: float 4s ease-in-out infinite; }

    @keyframes gradientShift {
      0%   { background-position: 0%   50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0%   50%; }
    }
    .gradient-animate {
      background-size: 200% 200%;
      animation: gradientShift 6s ease infinite;
    }

    @keyframes shimmer {
      from { background-position: -200% 0; }
      to   { background-position: 200% 0; }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .slide-in-left { animation: slideInLeft 0.2s ease; }

    /* ── Progress bar ── */
    .progress-track {
      height: 4px;
      background: rgba(15,23,42,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* ── Pill ── */
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 9999px;
      font-size: 11.5px;
      font-weight: 600;
      border: 1px solid transparent;
    }

    /* ── Action card hover ── */
    .action-card {
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .action-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(15,23,42,0.12);
    }

    /* ── Header ── */
    .app-header {
      background: rgba(255,255,255,0.96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      box-shadow: 0 1px 3px rgba(15,23,42,0.06);
    }

    /* ── Circular SVG ring ── */
    .ring-progress {
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }

    /* ── Question type left borders ── */
    .q-long      { border-left: 3px solid #6366f1; }
    .q-mcq       { border-left: 3px solid #10b981; }
    .q-short     { border-left: 3px solid #3b82f6; }
    .q-numerical { border-left: 3px solid #f59e0b; }

    /* ── Notif type left borders ── */
    .notif-info    { border-left: 3px solid #3b82f6; }
    .notif-success { border-left: 3px solid #10b981; }
    .notif-warning { border-left: 3px solid #f59e0b; }
    .notif-error   { border-left: 3px solid #ef4444; }

    /* ── Row hover for tables ── */
    tr:hover td { background: rgba(99,102,241,0.04); }

    /* ── Form section headings ── */
    .form-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6366f1;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(99,102,241,0.15);
    }

    /* ── Info/warning banners ── */
    .info-banner {
      background: rgba(99,102,241,0.07);
      border: 1px solid rgba(99,102,241,0.18);
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      color: #4f46e5;
    }
    .warning-banner {
      background: rgba(245,158,11,0.07);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      color: #b45309;
    }
    .lock-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 600;
      color: #b45309;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 4px;
      padding: 1px 6px;
      margin-left: 6px;
    }

    /* ── Feedback type badges ── */
    .feedback-complaint  { background: rgba(239,68,68,0.08); color: #b91c1c; border: 1px solid rgba(239,68,68,0.15); }
    .feedback-suggestion { background: rgba(16,185,129,0.08); color: #047857; border: 1px solid rgba(16,185,129,0.15); }
    .feedback-feedback   { background: rgba(99,102,241,0.08); color: #4f46e5; border: 1px solid rgba(99,102,241,0.15); }
    .feedback-pending  { background: rgba(245,158,11,0.08); color: #b45309; border: 1px solid rgba(245,158,11,0.15); }
    .feedback-reviewed { background: rgba(59,130,246,0.08); color: #1d4ed8; border: 1px solid rgba(59,130,246,0.15); }
    .feedback-resolved { background: rgba(16,185,129,0.08); color: #047857; border: 1px solid rgba(16,185,129,0.15); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
